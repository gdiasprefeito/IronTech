        <div class="secao-login">
            <div class="card-login">
                <h2>Acesso ao Sistema IronTech</h2>

                <form action="index.html">

                    <div class="campo">
                        <label for="cpf">CPF do Usuário:</label>
                        <input type="text" id="cpf" required maxlength="14" placeholder="Digite seu CPF">
                    </div>

                    <div class="campo">
                        <label for="email">E-mail do Usuário:</label>
                        <input type="email" id="email" required placeholder="Ex: stark@irontech.com">
                    </div>

                    <div class="campo">
                        <label for="senha">Senha de Acesso:</label>
                        <input type="password" id="senha" required placeholder="Digite sua senha">
                    </div>

                    <div class="campo">
                        <label for="cidade">Cidade:</label>
                        <input type="text" id="cidade" required placeholder="Digite sua cidade">
                    </div>

                    <div class="campo">
                        <label for="estado">Estado:</label>
                        <input type="text" id="estado" required placeholder="Digite seu estado">
                    </div>

                    <div class="campo">
                        <label for="pais">País:</label>
                        <input type="text" id="pais" required placeholder="Digite seu país">
                    </div>

                    <div class="pagamento-login">
                        <p>Forma de pagamento </p>

                        <label>
                            <input type="radio" name="pagamento" value="pix" required>
                            Pix
                        </label>

                        <label>
                            <input type="radio" name="pagamento" value="cartao">
                            Cartão
                        </label>

                        <label>
                            <input type="radio" name="pagamento" value="boleto">
                            Boleto
                        </label>
                    </div>

                    <button type="submit" class="botao-entrar">Entrar</button>

                </form>
            </div>
        </div>



</div>
